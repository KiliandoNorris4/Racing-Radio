<!DOCTYPE html>
<html lang="de">
<head>
  <meta http-equiv="refresh" content="0; url=home.html">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Racing Radio</title>
  <link rel="stylesheet" href="style.css">
</head>

<script>
  window.location.href = "home.html";
</script>

<body>

  <header>
  <h1>RACING RADIO</h1>
  <p>Song Requests</p>
</header>

<nav class="navbar">

  <div class="logo-area">
    <a href="home.html">
      <img src="logo.png" class="logo">
    </a>
    <span></span>
  </div>

  <button class="menu-btn" onclick="toggleMenu()">
    ☰
  </button>

</nav>

<div id="sideMenu" class="side-menu">

  <a href="home.html">Home</a>

  <a href="#songList">Song Requests</a>

  <a href="#topSongs">Top Songs</a>

</div>
<div class="now-playing">
  <span class="live-dot"></span>
  LIVE NOW PLAYING:
  <span id="nowPlayingText">Noch kein Song</span>
</div>
<div class="bg-glow"></div>

<div class="card">

  <input id="viewer" placeholder="Dein Name">

  <input id="song" placeholder="Songtitel">

  <input id="artist" placeholder="Künstler">

  <button onclick="submitSong()">SONG SENDEN</button>

</div>

<div class="charts-container">

  <div class="chart-box">
    <h2>Top Songs</h2>
    <div id="topSongs"></div>
  </div>

  <div class="chart-box">
    <h2>Top Requests</h2>
    <div id="songList"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
