<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TrackTime | Streamplan</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/streamplan.css">

</head>

<body>

<div class="bg-glow"></div>

<header class="topbar">

    <div class="left">

        <a href="index.html">
            <img src="logo.png"
                 class="logo"
                 alt="TrackTime">
        </a>

        <nav class="buttons">

            <a href="index.html">Home</a>
            <a href="musik.html">Musikwunsch</a>
            <a href="team.html">Team</a>

        </nav>

    </div>

</header>

<main class="container">

    <!-- Header -->

    <section class="stream-header">

        <button id="prevWeek" class="week-btn">
            ◀
        </button>

        <div>

            <h1>STREAMPLAN</h1>

            <p id="weekText">
                Kalenderwoche
            </p>

        </div>

        <button id="nextWeek" class="week-btn">
            ▶
        </button>

    </section>

    <!-- Countdown -->

    <section class="countdown-box">

        <span id="countdown">

            Lade nächsten Stream...

        </span>

    </section>

    <!-- Tabelle -->

    <section class="table-wrapper">

        <table id="streamTable">

            <thead>

                <tr>

                    <th></th>

                    <th>Montag</th>
                    <th>Dienstag</th>
                    <th>Mittwoch</th>
                    <th>Donnerstag</th>
                    <th>Freitag</th>
                    <th>Samstag</th>
                    <th>Sonntag</th>

                </tr>

            </thead>

            <tbody id="calendar">

            </tbody>

        </table>

    </section>

</main>

<!-- Admin -->

<div id="adminModal" class="modal hidden">

    <div class="modal-content">

    <h2>TrackTime Admin</h2>

    <input
        id="searchStream"
        type="text"
        placeholder="🔍 Stream suchen">

    <hr>

    <input
        id="streamTitle"
        type="text"
        placeholder="Titel">

    <input
        id="streamDescription"
        type="text"
        placeholder="Beschreibung">

    <input
        id="streamDate"
        type="date">

    <input
        id="streamTime"
        type="time">

    <button id="saveStream">

        💾 Stream speichern

    </button>

    <hr>

    <div id="streamList">

    </div>

        <button id="closeAdmin">

         Schließen

        </button>

    </div>

</div>

<!-- Toast -->

<div id="toast">

</div>

<script type="module" src="js/supabase.js"></script>
<script type="module" src="js/streamplan.js"></script>
<script type="module" src="js/admin.js"></script>

<script src="js/main.js"></script>

</body>

</html>
