<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kilian Racing Radio</title>
  <h2>🔥 Top Songs</h2>
  <div id="topSongs"></div>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="now-playing">
  <span class="live-dot"></span>
  LIVE NOW PLAYING:
  <span id="nowPlayingText">Noch kein Song</span>
</div>
<div class="bg-glow"></div>

<header>
  <h1>RACING RADIO</h1>
  <p>Song Requests</p>
</header>

<div class="card">

  <input id="viewer" placeholder="Dein Name">

  <input id="song" placeholder="Songtitel">

  <input id="artist" placeholder="Künstler">

  <button onclick="submitSong()">SONG SENDEN</button>

</div>

<div class="requests">

  <h2>🔥 Top Requests</h2>

  <div id="songList"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
