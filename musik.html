<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackTime</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <header class="">

    <div class="topbar">
      <a href="index.html">
        <img src="logo.png" alt="Logo" class="logo">
      </a>

      <nav class="buttons">
        <a href="#">Team</a>
        <a href="#">Tabellen</a>
        <a href="#">News</a>
        <a href="streamplan.html">Streamplan</a>
      </nav>
    </div>
      <h1>Racing Radio</h1>
      <h2>Song Request</h2>
  </header>

  

<div class="now-playing">
  <span class="live-dot"></span>
  LIVE NOW PLAYING:
  <span id="nowPlayingText">Noch kein Song</span>
</div>
<div class="bg-glow"></div>

<div class="card">

  <input id="viewer" placeholder="Dein Name">

  <input id="song" placeholder="Songtitel">

  <input id="artist" placeholder="Künstler">

  <button onclick="submitSong()">SONG SENDEN</button>

</div>

<div class="charts-container">

  <div class="chart-box">
    <h2>Top Songs</h2>
    <div id="topSongs"></div>
  </div>

  <div class="chart-box">
    <h2>Top Requests</h2>
    <div id="songList"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
